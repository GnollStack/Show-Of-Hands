<div class="ttb-advanced">
    <section class="ttb-advanced-section">
        <h3>Shared Cursor Tuning</h3>

        <div class="ttb-form-group">
            <label>
                Shared Cursor Opacity
                <span class="ttb-inline-value">{{sharedCursorOpacity}}</span>
            </label>
            <input type="range" name="sharedCursorOpacity" min="0.1" max="1" step="0.05" value="{{sharedCursorOpacity}}">
        </div>

        <label class="ttb-toggle-label">
            <input type="checkbox" name="disableCursorFade" {{checked disableCursorFade}}>
            Disable shared cursor fade-out
        </label>

        <label class="ttb-toggle-label">
            <input type="checkbox" name="idleIdentityFade" {{checked idleIdentityFade}}>
            Show hidden Foundry identity on idle
        </label>
    </section>

    <section class="ttb-advanced-section">
        <h3>Marquee Targeting</h3>
        <div class="ttb-form-group">
            <label>Token Filter</label>
            <select name="marqueeTokenFilter">
                {{#each marqueeTokenFilters}}
                <option value="{{value}}" {{#if selected}}selected{{/if}}>{{label}}</option>
                {{/each}}
            </select>
        </div>
    </section>

    <section class="ttb-advanced-section">
        <h3>Shared Cursor Visibility</h3>
        {{#if hasUsers}}
        <div class="ttb-user-visibility-list">
            {{#each users}}
            <label class="ttb-toggle-label">
                <input type="checkbox" name="hiddenUsers.{{id}}" {{checked hidden}}>
                Hide {{name}}{{#unless active}} (offline){{/unless}}
            </label>
            {{/each}}
        </div>
        {{else}}
        <p class="ttb-notes">No other users are available in this world.</p>
        {{/if}}
    </section>

    <section class="ttb-advanced-section">
        <h3>Diagnostics</h3>
        <div class="ttb-diagnostics-actions">
            <button type="button" class="ttb-refresh-diagnostics">
                <i class="fas fa-rotate"></i> Refresh
            </button>
            <button type="button" class="ttb-copy-diagnostics">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>
        <textarea class="ttb-diagnostics-output" readonly>{{diagnostics}}</textarea>
    </section>

    <footer class="ttb-sheet-footer flexrow">
        <button type="submit" name="submit">
            <i class="fas fa-check"></i> Save
        </button>
    </footer>
</div>
